[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DUSER_SETUP_LOADED
    -DILI9341_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=18
    -DTFT_MISO=13
    -DTFT_CS=10
    -DTFT_DC=14
    -DTFT_RST=9
    -DTOUCH_CS=12
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0
    tzapu/WiFiManager@^2.0.0

[env:esp32s3-demo-web]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    '-DAGENT_HOST="claude-tamagotchi-mock-production.up.railway.app"'
    -DAGENT_PORT=80

[env:esp32s3-debug]
extends = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DDEBUG_MODE
    -DDEBUG_INTERVAL_MS=10000
