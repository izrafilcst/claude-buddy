<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Buddy — LCD Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0a09;
    color: #e7e5e4;
    font-family: 'VT323', monospace;
    font-size: 18px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 40px;
    gap: 20px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #ca8a04;
    letter-spacing: 1px;
  }
  header span {
    font-size: 16px;
    color: #57534e;
  }

  .workspace {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  /* ── LCD device frame ── */
  .device {
    flex-shrink: 0;
    background: #1c1917;
    border-radius: 18px;
    padding: 18px 14px 22px;
    border: 2px solid #292524;
    box-shadow:
      0 0 0 1px #0c0a09,
      0 20px 60px rgba(0,0,0,.6),
      inset 0 1px 0 rgba(255,255,255,.04);
  }
  .device-top {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .device-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #44403c;
  }
  .device-dot.cam { background: #292524; border: 1px solid #3a3330; }
  .screen-bezel {
    background: #000;
    border-radius: 4px;
    padding: 3px;
    border: 1px solid #1a1614;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 480px;   /* 240 × 2 */
    height: 640px;  /* 320 × 2 */
    border-radius: 2px;
  }
  .device-btn-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 14px;
  }
  .hw-btn {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #292524;
    border: 1px solid #44403c;
    cursor: pointer;
    transition: background 0.15s;
  }
  .hw-btn:hover { background: #44403c; }

  /* ── Control panel ── */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 200px;
    padding-top: 2px;
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #57534e;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .state-grid {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .state-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: #1c1917;
    border: 1px solid #292524;
    border-radius: 5px;
    color: #a8a29e;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 17px;
    text-align: left;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    width: 100%;
  }
  .state-btn:hover { background: #292524; color: #e7e5e4; }
  .state-btn.active {
    background: #1c120a;
    border-color: #ca8a04;
    color: #fbbf24;
  }
  .state-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #44403c;
  }
  .state-btn.active .state-dot { background: #ca8a04; }

  /* State colors */
  .state-btn[data-state="RADIANT"].active  { border-color: #f59e0b; }
  .state-btn[data-state="CONTENT"].active  { border-color: #84cc16; }
  .state-btn[data-state="NORMAL"].active   { border-color: #22c55e; }
  .state-btn[data-state="TIRED"].active    { border-color: #f97316; }
  .state-btn[data-state="EXHAUSTED"].active { border-color: #ef4444; }
  .state-btn[data-state="OFF"].active      { border-color: #6b7280; }
  .state-btn[data-state="CONFUSED"].active { border-color: #a78bfa; }
  .state-btn[data-state="SEARCHING"].active { border-color: #38bdf8; }

  /* ── Agent card ── */
  .agent-card {
    background: #1c1917;
    border: 1px solid #292524;
    border-radius: 6px;
    padding: 12px;
  }
  .agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .agent-led {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #44403c;
    flex-shrink: 0;
    transition: background 0.3s;
    box-shadow: none;
  }
  .agent-led.ok  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .agent-led.err { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .agent-info { font-size: 15px; color: #78716c; }
  .agent-info.ok { color: #86efac; }
  .agent-info.err { color: #fca5a5; }

  .poll-btn {
    width: 100%;
    padding: 6px 10px;
    background: #292524;
    border: 1px solid #44403c;
    border-radius: 4px;
    color: #a8a29e;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 16px;
    transition: background 0.12s;
  }
  .poll-btn:hover { background: #3a3330; color: #e7e5e4; }
  .poll-btn.active { background: #1c2914; border-color: #22c55e; color: #86efac; }

  /* ── Footer stats ── */
  .stats {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: auto;
  }
  .stat {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #44403c;
  }
  .stat span:last-child { color: #78716c; }

  /* ── Quota bar (visible when agent online) ── */
  .quota-bar-wrap {
    margin-top: 8px;
    height: 4px;
    background: #292524;
    border-radius: 2px;
    overflow: hidden;
  }
  .quota-bar-fill {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease, background 0.4s ease;
    background: #22c55e;
  }
</style>
</head>
<body>

<header>
  <h1>Claude Buddy</h1>
  <span>LCD Preview · 240×320</span>
</header>

<div class="workspace">

  <!-- Device -->
  <div class="device">
    <div class="device-top">
      <div class="device-dot cam"></div>
      <div class="device-dot"></div>
      <div class="device-dot"></div>
    </div>
    <div class="screen-bezel">
      <canvas id="lcd" width="240" height="320"></canvas>
    </div>
    <div class="device-btn-row">
      <div class="hw-btn" title="Tap" id="tapBtn"></div>
      <div class="hw-btn" title="Long press" id="longBtn"></div>
    </div>
  </div>

  <!-- Panel -->
  <div class="panel">

    <div>
      <div class="section-title">State</div>
      <div class="state-grid">
        <button class="state-btn" data-state="RADIANT">
          <span class="state-dot"></span>RADIANT
        </button>
        <button class="state-btn" data-state="CONTENT">
          <span class="state-dot"></span>CONTENT
        </button>
        <button class="state-btn active" data-state="NORMAL">
          <span class="state-dot"></span>NORMAL
        </button>
        <button class="state-btn" data-state="TIRED">
          <span class="state-dot"></span>TIRED
        </button>
        <button class="state-btn" data-state="EXHAUSTED">
          <span class="state-dot"></span>EXHAUSTED
        </button>
        <button class="state-btn" data-state="OFF">
          <span class="state-dot"></span>OFF
        </button>
        <button class="state-btn" data-state="CONFUSED">
          <span class="state-dot"></span>CONFUSED
        </button>
        <button class="state-btn" data-state="SEARCHING">
          <span class="state-dot"></span>SEARCHING
        </button>
      </div>
    </div>

    <div class="agent-card">
      <div class="section-title">Mock Agent :8266</div>
      <div class="agent-row">
        <div class="agent-led" id="agentLed"></div>
        <span class="agent-info" id="agentInfo">disconnected</span>
      </div>
      <div class="quota-bar-wrap" id="quotaWrap" style="display:none">
        <div class="quota-bar-fill" id="quotaFill"></div>
      </div>
      <button class="poll-btn" id="pollBtn" style="margin-top:10px">
        Start polling
      </button>
    </div>

    <div class="stats">
      <div class="section-title">Debug</div>
      <div class="stat"><span>fps</span><span id="fpsVal">--</span></div>
      <div class="stat"><span>bounce_y</span><span id="byVal">0</span></div>
      <div class="stat"><span>blink</span><span id="blinkVal">0</span></div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Constants — mirrors firmware exactly
// ─────────────────────────────────────────────────────────────────────────────
const W = 240, H = 320;
const CLAWD_BASE_Y = 150;
const SPR = 64;

const B_W = 44, B_H = 22;
const B_L = (SPR - B_W) >> 1;   // 10
const B_R = B_L + B_W;          // 54
const B_T = 6;
const B_B = B_T + B_H;          // 28
const L_W = 8, L_H = 14;
const E_SZ = 8;
const E_Y  = B_T + 4;           // 10
const EL_X = B_L + 4;           // 14
const ER_X = B_R - E_SZ - 4;    // 42
const LEG_XS = [12, 23, 33, 44];

// Brand palette (hex strings matching colors.h)
const CLR = {
  CRAIL:       '#C15F3C',
  CRAIL_LIGHT: '#E8845C',
  PAMPAS:      '#F4F3EE',
  DARK_BG:     '#0D0A07',
  CLOUDY:      '#B1ADA1',
  WHITE:       '#F8FAFC',
  GRAY:        '#808080',
};

function lerpHex(c1, c2, t) {
  const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [r1,g1,b1] = h(c1), [r2,g2,b2] = h(c2);
  return `rgb(${(r1+(r2-r1)*t)|0},${(g1+(g2-g1)*t)|0},${(b1+(b2-b1)*t)|0})`;
}

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let mascot = 'NORMAL';
let bounce_y = 0, tremor_x = 0, blink = 0, zzz_frame = 0;
let headerPhase = 0;
const particles = Array.from({length: 6}, () => ({x:0,y:0,vx:0,vy:0,life:0}));

function updateAnim(t) {
  switch (mascot) {
    case 'RADIANT':   bounce_y = Math.sin(t*3)*8;   tremor_x = 0; break;
    case 'CONTENT':   bounce_y = Math.sin(t*2)*5;   tremor_x = 0; break;
    case 'NORMAL':    bounce_y = 0;                  tremor_x = 0; break;
    case 'TIRED':     bounce_y = 14; tremor_x = ((Math.random()-.5)*2)|0; break;
    case 'EXHAUSTED': bounce_y = 24; tremor_x = 0; zzz_frame++; break;
    case 'OFF':       bounce_y = 20; tremor_x = 0; break;
    case 'CONFUSED':  bounce_y = Math.sin(t*5)*3; tremor_x = ((Math.random()-.5)*4)|0; break;
    case 'SEARCHING': bounce_y = Math.sin(t*1.2)*10; tremor_x = 0; break;
  }
  if (++blink >= 150) blink = 0;
  headerPhase += 0.05;
}

// ─────────────────────────────────────────────────────────────────────────────
// Drawing
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('lcd');
const ctx    = canvas.getContext('2d');

// Offscreen sprite (transparent background)
const sprCanvas = document.createElement('canvas');
sprCanvas.width = SPR; sprCanvas.height = SPR;
const sc = sprCanvas.getContext('2d');

function drawBackground() {
  // PAMPAS fill
  ctx.fillStyle = CLR.PAMPAS;
  ctx.fillRect(0, 0, W, H);

  // Subtle header bar
  ctx.fillStyle = lerpHex(CLR.PAMPAS, CLR.CLOUDY, 0.15);
  ctx.fillRect(0, 0, W, 26);

  // Animated header dots (3 dots, different phase)
  for (let i = 0; i < 3; i++) {
    const phase  = Math.sin(headerPhase + i * 2.094);
    const dy     = 2 + (phase + 1) * 1.5;
    ctx.beginPath();
    ctx.arc(W/2 + (i-1)*12, 13 + dy, 2.5, 0, Math.PI*2);
    ctx.fillStyle = lerpHex(CLR.CLOUDY, CLR.CRAIL, 0.45);
    ctx.fill();
  }

  // WiFi icon top-right (SEARCHING state)
  if (mascot === 'SEARCHING') {
    drawWifi(W - 18, 8, 0.5);
  }
}

function drawWifi(x, y, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = CLR.CLOUDY;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  for (let i = 0; i < 3; i++) {
    const r = 4 + i * 3.5;
    ctx.beginPath();
    ctx.arc(x, y + 8, r, Math.PI*1.1, Math.PI*1.9);
    ctx.stroke();
  }
  ctx.fillStyle = CLR.CLOUDY;
  ctx.beginPath(); ctx.arc(x, y + 8, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEyes() {
  switch (mascot) {
    case 'EXHAUSTED':
    case 'OFF': {
      const mid = E_Y + E_SZ/2 - 1;
      sc.fillStyle = '#000';
      sc.fillRect(EL_X, mid, E_SZ, 2);
      sc.fillRect(ER_X, mid, E_SZ, 2);
      break;
    }
    case 'TIRED': {
      const mid = E_Y + E_SZ/2;
      sc.fillStyle = '#000';
      sc.fillRect(EL_X, mid, E_SZ, E_SZ/2);
      sc.fillRect(ER_X, mid, E_SZ, E_SZ/2);
      break;
    }
    case 'CONFUSED': {
      sc.strokeStyle = '#000';
      sc.lineWidth = 1.5;
      sc.beginPath();
      sc.moveTo(EL_X+1, E_Y+1);     sc.lineTo(EL_X+E_SZ-2, E_Y+E_SZ-2);
      sc.moveTo(EL_X+E_SZ-2, E_Y+1); sc.lineTo(EL_X+1, E_Y+E_SZ-2);
      sc.moveTo(ER_X+1, E_Y+1);     sc.lineTo(ER_X+E_SZ-2, E_Y+E_SZ-2);
      sc.moveTo(ER_X+E_SZ-2, E_Y+1); sc.lineTo(ER_X+1, E_Y+E_SZ-2);
      sc.stroke();
      break;
    }
    case 'SEARCHING': {
      sc.fillStyle = '#000';
      sc.fillRect(EL_X, E_Y, E_SZ, E_SZ);
      sc.fillRect(ER_X, E_Y, E_SZ, E_SZ);
      sc.fillStyle = CLR.WHITE;
      sc.fillRect(EL_X+1, E_Y+1, 2, 2);
      sc.fillRect(ER_X+1, E_Y+1, 2, 2);
      break;
    }
    default: {
      if (blink < 4) {
        const mid = E_Y + E_SZ/2 - 1;
        sc.fillStyle = '#000';
        sc.fillRect(EL_X, mid, E_SZ, 2);
        sc.fillRect(ER_X, mid, E_SZ, 2);
      } else {
        sc.fillStyle = '#000';
        sc.fillRect(EL_X, E_Y, E_SZ, E_SZ);
        sc.fillRect(ER_X, E_Y, E_SZ, E_SZ);
        sc.fillStyle = CLR.WHITE;
        sc.fillRect(EL_X+1, E_Y+1, 2, 2);
        sc.fillRect(ER_X+1, E_Y+1, 2, 2);
      }
    }
  }
}

function drawClawd(cx, cy) {
  sc.clearRect(0, 0, SPR, SPR);

  let bodyC = CLR.CRAIL;
  let shadC = lerpHex(CLR.CRAIL, CLR.DARK_BG, 0.35);

  if (mascot === 'OFF') {
    bodyC = lerpHex(CLR.CRAIL, CLR.GRAY, 0.5);
    shadC = lerpHex(bodyC, CLR.DARK_BG, 0.35);
  } else if (mascot === 'EXHAUSTED') {
    bodyC = lerpHex(CLR.CRAIL, CLR.GRAY, 0.28);
    shadC = lerpHex(bodyC, CLR.DARK_BG, 0.35);
  }

  // RADIANT glow halo
  if (mascot === 'RADIANT') {
    sc.fillStyle = lerpHex(CLR.CRAIL_LIGHT, CLR.PAMPAS, 0.55);
    sc.fillRect(B_L-5, B_T-5, B_W+10, B_H+10);
  }

  // Body
  sc.fillStyle = bodyC;
  sc.fillRect(B_L, B_T, B_W, B_H);
  // Shadow strip
  sc.fillStyle = shadC;
  sc.fillRect(B_L, B_B-5, B_W, 5);

  // Four legs
  for (const lx of LEG_XS) {
    sc.fillStyle = bodyC;
    sc.fillRect(lx, B_B, L_W, L_H);
    sc.fillStyle = shadC;
    sc.fillRect(lx, B_B+L_H-4, L_W, 4);
  }

  drawEyes();

  // Blit sprite to main canvas (transparent regions become PAMPAS background)
  ctx.drawImage(sprCanvas, cx - SPR/2, cy - SPR/2);
}

function drawParticles(cx, cy) {
  if (mascot !== 'RADIANT') return;
  const r = B_W/2 + 10;
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.life > 0) p.life--;
    if (p.life === 0) {
      const a = Math.random() * Math.PI * 2;
      p.x = cx + Math.cos(a) * r; p.y = cy + Math.sin(a) * r;
      p.vx = Math.cos(a) * 0.4;   p.vy = Math.sin(a) * 0.4 - 0.2;
      p.life = 20 + (Math.random()*30)|0;
    }
    const sz = p.life > 25 ? 2 : 1;
    ctx.fillStyle = p.life > 15 ? CLR.CRAIL_LIGHT : CLR.CLOUDY;
    ctx.fillRect(p.x|0, p.y|0, sz, sz);
  }
}

function drawZzz(cx, cy) {
  const bx  = cx + B_W/2 + 4;
  const by  = cy - SPR/2 + B_T;
  const off = ((zzz_frame/3)|0) % 20;

  ctx.font = 'bold 12px "VT323", monospace';
  ctx.fillStyle = CLR.CLOUDY;
  ctx.textAlign = 'left';
  ctx.fillText('Z', bx,      by - off);
  ctx.font = '9px "VT323", monospace';
  ctx.fillText('z', bx + 10, by - off - 10);
  ctx.fillText('z', bx + 16, by - off - 18);
}

function drawErrorOverlay(msg) {
  ctx.fillStyle = 'rgba(13,10,7,0.78)';
  ctx.fillRect(8, H - 46, W - 16, 34);
  ctx.fillStyle = '#fca5a5';
  ctx.font = '13px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msg, W/2, H - 24);
}

// ─────────────────────────────────────────────────────────────────────────────
// Main loop (capped at ~15 fps to match firmware's 66ms ANIM_FRAME_MS)
// ─────────────────────────────────────────────────────────────────────────────
let lastFrameTime = 0, fpsCount = 0, fpsTimer = 0;

function frame(now) {
  requestAnimationFrame(frame);
  if (now - lastFrameTime < 66) return;
  lastFrameTime = now;

  const t = now / 1000;
  updateAnim(t);

  const cx = ((W/2) + tremor_x)|0;
  const cy = (CLAWD_BASE_Y + bounce_y)|0;

  drawBackground();
  drawClawd(cx, cy);
  drawParticles(cx, cy);
  if (mascot === 'EXHAUSTED') drawZzz(cx, cy);
  if (mascot === 'SEARCHING') drawErrorOverlay('WiFi disconnected');
  if (mascot === 'CONFUSED')  drawErrorOverlay('Agent offline');

  // FPS + debug
  fpsCount++;
  if (now - fpsTimer >= 1000) {
    document.getElementById('fpsVal').textContent   = fpsCount;
    fpsCount = 0; fpsTimer = now;
  }
  document.getElementById('byVal').textContent    = bounce_y.toFixed(1);
  document.getElementById('blinkVal').textContent = blink;
}

requestAnimationFrame(frame);

// ─────────────────────────────────────────────────────────────────────────────
// State buttons
// ─────────────────────────────────────────────────────────────────────────────
function setMascot(s) {
  mascot = s;
  document.querySelectorAll('.state-btn[data-state]').forEach(b => {
    b.classList.toggle('active', b.dataset.state === s);
  });
}

document.querySelectorAll('.state-btn[data-state]').forEach(btn => {
  btn.addEventListener('click', () => setMascot(btn.dataset.state));
});

// ─────────────────────────────────────────────────────────────────────────────
// Agent polling
// ─────────────────────────────────────────────────────────────────────────────
const agentLed  = document.getElementById('agentLed');
const agentInfo = document.getElementById('agentInfo');
const quotaWrap = document.getElementById('quotaWrap');
const quotaFill = document.getElementById('quotaFill');
const pollBtn   = document.getElementById('pollBtn');

let polling = false, pollTimer = null;

function quotaToMascot(pct, sessions, valid) {
  if (!valid || sessions === 0) return valid ? 'OFF' : 'CONFUSED';
  if (pct < 5)  return 'OFF';
  if (pct < 20) return 'EXHAUSTED';
  if (pct < 40) return 'TIRED';
  if (pct < 60) return 'NORMAL';
  if (pct < 80) return 'CONTENT';
  return 'RADIANT';
}

function barColor(pct) {
  if (pct >= 80) return '#22c55e';
  if (pct >= 60) return '#84cc16';
  if (pct >= 40) return '#f59e0b';
  if (pct >= 20) return '#f97316';
  return '#ef4444';
}

async function pollAgent() {
  try {
    const res = await fetch('http://localhost:8266/status',
      { signal: AbortSignal.timeout(2500) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    const s = quotaToMascot(d.quota_percent, d.sessions_active, true);
    setMascot(s);

    agentLed.className  = 'agent-led ok';
    agentInfo.className = 'agent-info ok';
    agentInfo.textContent = `${d.quota_percent}% · ${d.sessions_active} session${d.sessions_active !== 1 ? 's':''}`

    quotaWrap.style.display = '';
    quotaFill.style.width   = `${d.quota_percent}%`;
    quotaFill.style.background = barColor(d.quota_percent);
  } catch {
    agentLed.className  = 'agent-led err';
    agentInfo.className = 'agent-info err';
    agentInfo.textContent = 'offline';
    quotaWrap.style.display = 'none';
    setMascot('CONFUSED');
  }
}

pollBtn.addEventListener('click', () => {
  polling = !polling;
  if (polling) {
    pollBtn.textContent = 'Stop polling';
    pollBtn.classList.add('active');
    pollAgent();
    pollTimer = setInterval(pollAgent, 5000);
  } else {
    pollBtn.textContent = 'Start polling';
    pollBtn.classList.remove('active');
    clearInterval(pollTimer);
    agentLed.className  = 'agent-led';
    agentInfo.className = 'agent-info';
    agentInfo.textContent = 'disconnected';
    quotaWrap.style.display = 'none';
  }
});
</script>
</body>
</html>
